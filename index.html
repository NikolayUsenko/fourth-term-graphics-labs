<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кривые Безье на Canvas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 class="title">Рисование кривых Безье</h2>
        <div class="controls">
            <button id="quadraticBtn" class="active">Квадратичная Безье (3 точки)</button>
            <button id="cubicBtn">Кубическая Безье (4 точки)</button>
            <button id="clearBtn">Очистить</button>
        </div>
        <canvas id="bezierCanvas" width="600" height="400"></canvas>
        <div class="status" id="statusMessage">Кликните на Canvas, чтобы добавить точки</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
