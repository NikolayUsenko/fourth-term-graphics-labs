<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>3D Software Renderer</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: monospace;
      background: #1a1a1a;
      color: white;
    }
    canvas {
      border: 2px solid #444;
      background: #000;
      display: block;
      margin: 0 auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .controls {
      text-align: center;
      margin: 20px;
    }
    .controls button, .controls select {
      margin: 5px;
      padding: 8px 16px;
      font-family: monospace;
      font-size: 14px;
      background: #333;
      color: white;
      border: 1px solid #666;
      cursor: pointer;
      border-radius: 4px;
    }
    .controls button:hover {
      background: #555;
    }
    .info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 4px;
      font-family: monospace;
      z-index: 100;
    }
    h1 {
      text-align: center;
      font-size: 18px;
      margin: 10px 0;
      color: #0f0;
    }
  </style>
</head>
<body>
  <div class="info" id="info">
    FPS: 0 | Рёбер: 12
  </div>
  <canvas id="canvas" width="800" height="600"></canvas>
  <div class="controls">
    <button id="rotateBtn">▶ Вращать</button>
    <button id="resetBtn">⟳ Сброс</button>
    <label>Проекция:
      <select id="projectionSelect">
        <option value="perspective">Перспективная</option>
        <option value="orthographic">Ортографическая</option>
      </select>
    </label>
  </div>

  <script src="math/vector3.js"></script>
  <script src="math/matrix4.js"></script>
  <script src="models/octahedron.js"></script>
  <script src="renderer/wireframe.js"></script>
  <script src="script.js"></script>
</body>
</html>
